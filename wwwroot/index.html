<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Collaboard Rooms</title>

    <script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@9.0.6/dist/browser/signalr.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <script src="https://www.whiteboard.team/dist/api.js"></script>

    <link rel="stylesheet" href="rooms.css" />
</head>
<body>
    <div id="usernameModal" role="dialog" aria-modal="true" aria-labelledby="usernameTitle">
        <form class="modal-content" id="usernameForm">
            <img src="final_logo.png" alt="Collaboard Rooms" class="modal-logo" />
            <h1 id="usernameTitle">Join Collaboard Rooms</h1>
            <label for="usernameInput">Display name</label>
            <input type="text" id="usernameInput" maxlength="40" autocomplete="nickname" placeholder="Your name" required />
            <button type="submit">Join room</button>
            <p class="form-error" id="usernameError" role="alert"></p>
        </form>
    </div>

    <header class="app-header">
        <div class="brand">
            <img src="final_logo.png" alt="Collaboard Rooms" />
            <div class="session-meta">
                <span>Room <strong id="roomNameDisplay"></strong></span>
                <span id="connectionStatus" class="connection-status">Not connected</span>
            </div>
        </div>
        <button class="icon-button" id="menuToggle" type="button" aria-label="Open collaboration panel" title="Open panel">
            <i class="fa-solid fa-bars" aria-hidden="true"></i>
        </button>
    </header>

    <main class="app-container">
        <section class="video-area" aria-label="Video call">
            <div id="videoGrid" class="video-grid"></div>
        </section>
    </main>

    <div id="statusIndicator" aria-live="polite">Mic: Off | Camera: Off</div>

    <aside id="dropdownPanel" class="dropdown-panel" aria-label="Collaboration panel">
        <div id="panelResizeHandle" class="panel-resize-handle" aria-hidden="true"></div>
        <div class="tabs" role="tablist" aria-label="Collaboration tools">
            <button id="chatTab" class="tab-btn active" type="button" role="tab" aria-selected="true" aria-controls="chatPanel">Chat</button>
            <button id="whiteboardTab" class="tab-btn" type="button" role="tab" aria-selected="false" aria-controls="whiteboardPanel">Whiteboard</button>
        </div>

        <section id="chatPanel" class="panel-content active" role="tabpanel" aria-labelledby="chatTab">
            <h2>Chat</h2>
            <div class="chat-container">
                <div id="chatBox" class="chat-box" aria-live="polite"></div>
                <form class="chat-input" id="chatForm">
                    <input type="text" id="chatInput" maxlength="1000" placeholder="Type a message..." autocomplete="off" />
                    <button type="submit" aria-label="Send message" title="Send message">
                        <i class="fa-solid fa-paper-plane" aria-hidden="true"></i>
                    </button>
                </form>
            </div>
        </section>

        <section id="whiteboardPanel" class="panel-content" role="tabpanel" aria-labelledby="whiteboardTab" hidden>
            <div class="whiteboard-container">
                <div id="wt-container" class="wt-container"></div>
            </div>
        </section>
    </aside>

    <nav class="bottom-toolbar" aria-label="Call controls">
        <button id="muteButton" type="button" title="Mute or unmute microphone">
            <i class="fa-solid fa-microphone" aria-hidden="true"></i>
            <span>Mute</span>
        </button>
        <button id="cameraButton" type="button" title="Turn camera on or off">
            <i class="fa-solid fa-video" aria-hidden="true"></i>
            <span>Camera</span>
        </button>
        <button id="screenShareButton" type="button" title="Share screen">
            <i class="fa-solid fa-display" aria-hidden="true"></i>
            <span id="screenShareBtnLabel">Share</span>
        </button>
        <div class="background-control">
            <button id="virtualBackgroundButton" type="button" title="Choose background effect" aria-haspopup="menu" aria-expanded="false" aria-controls="backgroundMenu">
                <i class="fa-solid fa-image" aria-hidden="true"></i>
                <span>Background</span>
            </button>
            <div id="backgroundMenu" class="background-menu" role="menu" aria-label="Background effects" hidden>
                <p class="background-menu-title">Background effects</p>
                <button class="background-option is-active" type="button" role="menuitemradio" aria-checked="true" data-background-effect="none">
                    <span class="background-swatch swatch-none" aria-hidden="true"></span>
                    <span>None</span>
                </button>
                <button class="background-option" type="button" role="menuitemradio" aria-checked="false" data-background-effect="blur">
                    <span class="background-swatch swatch-blur" aria-hidden="true"></span>
                    <span>Soft blur</span>
                </button>
                <button class="background-option" type="button" role="menuitemradio" aria-checked="false" data-background-effect="blue-studio">
                    <span class="background-swatch swatch-blue-studio" aria-hidden="true"></span>
                    <span>Blue studio</span>
                </button>
                <button class="background-option" type="button" role="menuitemradio" aria-checked="false" data-background-effect="midnight-grid">
                    <span class="background-swatch swatch-midnight-grid" aria-hidden="true"></span>
                    <span>Midnight grid</span>
                </button>
                <button class="background-option" type="button" role="menuitemradio" aria-checked="false" data-background-effect="neon-focus">
                    <span class="background-swatch swatch-neon-focus" aria-hidden="true"></span>
                    <span>Neon focus</span>
                </button>
                <button class="background-option" type="button" role="menuitemradio" aria-checked="false" data-background-effect="cool-mono">
                    <span class="background-swatch swatch-cool-mono" aria-hidden="true"></span>
                    <span>Cool mono</span>
                </button>
            </div>
        </div>
        <button id="raiseHandButton" type="button" title="Raise hand">
            <i class="fa-solid fa-hand" aria-hidden="true"></i>
            <span>Hand</span>
        </button>
        <button id="recordButton" type="button" title="Record local stream">
            <i class="fa-solid fa-record-vinyl" aria-hidden="true"></i>
            <span id="recordBtnLabel">Record</span>
        </button>
    </nav>

    <script src="js/rooms-app.js"></script>
    <script src="js/rooms-peer-connection.js"></script>
    <script src="js/rooms-video-controls.js"></script>
    <script src="js/rooms-ui-controls.js"></script>
    <script src="js/rooms-whiteboard.js"></script>
    <script src="js/rooms-chat.js"></script>
</body>
</html>
